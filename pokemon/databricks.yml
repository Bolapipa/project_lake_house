    mode: development
    default: true
    workspace:
      host: https://dbc-414ad402-adeb.cloud.databricks.com
    variables:
      environment: dev
      catalog: bronze_dev   # corrigido
      schema: ds_pokemon   # corrigido

  prod:
    mode: production
    workspace:
      host: https://dbc-414ad402-adeb.cloud.databricks.com
      root_path: /Workspace/Users/delacortearthur@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      environment: prod
      catalog: bronze_prod   # corrigido
      schema: ds_pokemon   # corrigido
    permissions:
      - user_name: delacortearthur@gmail.com
        level: CAN_MANAGE