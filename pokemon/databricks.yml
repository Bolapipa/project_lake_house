bundle:
  name: pokemon

include:
  - resources/*.yml
  - resources/*/*.yml

variables:
  environment:
    description: "Environment name (dev or prod)"
    default: dev

  catalog:
    description: "Catalog de destino"
    default: bronze_dev

  schema:
    description: "Schema de destino"
    default: ds_pokemon

  pause_status:
    description: "Job schedule status"
    default: PAUSED

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-414ad402-adeb.cloud.databricks.com
      root_path: /Workspace/Users/delacortearthur@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      environment: dev
      catalog: bronze_dev
      schema: ds_pokemon
      pause_status: PAUSED

  prod:
    mode: production
    workspace:
      host: https://dbc-414ad402-adeb.cloud.databricks.com
      root_path: /Workspace/Users/delacortearthur@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      environment: prod
      catalog: bronze_prod
      schema: ds_pokemon
      pause_status: UNPAUSED

    permissions:
      - user_name: delacortearthur@gmail.com
        level: CAN_MANAGE