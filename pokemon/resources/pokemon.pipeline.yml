# The main pipeline for pokemon
resources:
  pipelines:
    pokemon_pipeline:
      name: pokemon_etl
      catalog: silver_${var.environment}
      schema: ds_pokemon

      tags:
        environment: ${var.environment}

      serverless: true

      libraries:
        - notebook:
            path: ../src/dlt_pokemon.sql

      configuration:
        bundle.sourcePath: ${workspace.file_path}/src