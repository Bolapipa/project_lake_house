resources:
  pipelines:
    pokemon_pipeline:
      name: 'Pokemon ETL Pipeline'
      catalog: ${var.silver_catalog}
      target: ${var.schema}
      schema: ${var.schema}
      
      libraries:
        - notebook:
            path: ../src/dlt_pokemon.sql
      
      configuration:
        source_catalog: ${var.catalog}
        source_schema: ${var.schema}
      
      serverless: true
      continuous: false
      development: ${var.pipeline_development}
      photon: true
      channel: current
      
      permissions:
        - level: CAN_VIEW
          group_name: 'users'
