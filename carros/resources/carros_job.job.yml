resources:
  jobs:
    carros_job:
      name: carros_${bundle.target}

      tags:
        environment: ${bundle.target}

      schedule:
        quartz_cron_expression: "0 30 01 * * ?"
        timezone_id: "America/Sao_Paulo"
        pause_status: ${var.pause_status}
        
      parameters:
        - name: environment
          default: "${var.environment}"

        - name: catalog
          default: "${var.catalog}"

        - name: schema
          default: "${var.schema}"

      email_notifications:
        on_failure:
          - delacortearthur@gmail.com

      tasks:
        - task_key: ingest_marcas
          notebook_task:
            notebook_path: ../src/ingest_marcas.py
            base_parameters:
              environment: "{{job.parameters.environment}}"
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
          max_retries: 1

        - task_key: ingest_modelos
          depends_on:
            - task_key: ingest_marcas
          notebook_task:
            notebook_path: ../src/ingest_modelos.py
            base_parameters:
              environment: "{{job.parameters.environment}}"
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
          max_retries: 1

        - task_key: ingest_anos
          depends_on:
            - task_key: ingest_modelos
          notebook_task:
            notebook_path: ../src/ingest_anos.py
            base_parameters:
              environment: "{{job.parameters.environment}}"
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
          max_retries: 1

        - task_key: ingest_referencias
          depends_on:
            - task_key: ingest_anos
          notebook_task:
            notebook_path: ../src/ingest_referencias.py
            base_parameters:
              environment: "{{job.parameters.environment}}"
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
          max_retries: 1

        - task_key: ingest_fipe
          depends_on:
            - task_key: ingest_referencias
          notebook_task:
            notebook_path: ../src/ingest_fipe.py
            base_parameters:
              environment: "{{job.parameters.environment}}"
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
          max_retries: 1

        - task_key: refresh_pipeline_silver
          depends_on:
            - task_key: ingest_marcas
            - task_key: ingest_modelos
            - task_key: ingest_anos
            - task_key: ingest_referencias
            - task_key: ingest_fipe
          pipeline_task:
            pipeline_id: ${resources.pipelines.carros_pipeline_silver.id}
          max_retries: 1