# The main pipeline for carros
resources:
  pipelines:
    carros_pipeline:
      name: carros_etl
      catalog: silver_${var.environment}
      schema: ds_carros

      tags:
        environment: ${var.environment}

      serverless: true

      libraries:
        - notebook:
            path: ../src/dlt_carros.sql
        - notebook:
            path: ../src/dlt_carros_gold.sql

      configuration:
        bundle.sourcePath: ${workspace.file_path}/src