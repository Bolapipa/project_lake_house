bundle:
  name: open_meteo

include:
  - resources/*.yml
  - resources/*/*.yml

variables:
  environment:
    description: "Environment name (dev or prod)"
    default: dev

  catalog:
    description: "Catalog de destino"
    default: bronze_dev

  schema:
    description: "Schema de destino"
    default: ds_open_meteo

  silver_catalog:
    description: "Catalog de destino da silver"
    default: silver_dev

  pause_status:
    description: "Job schedule status"
    default: PAUSED

  pipeline_development:
    description: "Pipeline development mode flag"
    default: true

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-414ad402-adeb.cloud.databricks.com
      root_path: /Workspace/Users/delacortearthur@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      environment: dev
      catalog: bronze_dev
      schema: ds_open_meteo
      silver_catalog: silver_dev
      pause_status: PAUSED
      pipeline_development: true

  prod:
    mode: production
    workspace:
      host: https://dbc-414ad402-adeb.cloud.databricks.com
      root_path: /Workspace/Users/delacortearthur@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      environment: prod
      catalog: bronze_prod
      schema: ds_open_meteo
      silver_catalog: silver_prod
      pause_status: PAUSED
      pipeline_development: false

    permissions:
      - user_name: delacortearthur@gmail.com
        level: CAN_MANAGE