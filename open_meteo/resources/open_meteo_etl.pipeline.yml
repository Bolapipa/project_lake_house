resources:
  pipelines:
    open_meteo_silver:
      name: 'Open Meteo Silver Pipeline'
      catalog: ${var.silver_catalog}
      target: ${var.schema}
      
      libraries:
        - notebook:
            path: ../src/dlt_open_meteo.sql
      
      configuration:
        source_catalog: ${var.catalog}
        source_schema: ${var.schema}
      
      serverless: true
      continuous: false
      development: ${var.pipeline_development}
      photon: true
      
      channel: current
      
      permissions:
        - level: CAN_VIEW
          group_name: 'users'