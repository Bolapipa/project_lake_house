name: CI/CD ibge

on:
  push:
    branches:
      - dev
      - prod
    paths:
      - 'ibge/**'
      - '.github/workflows/ibge-ci-cd.yml'

  pull_request:
    branches:
      - dev
      - prod
    paths:
      - 'ibge/**'
      - '.github/workflows/ibge-ci-cd.yml'

  workflow_dispatch:

jobs:
  validate-ibge:
    name: Validar bundle ibge
    runs-on: ubuntu-latest

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    defaults:
      run:
        working-directory: ibge

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar Databricks CLI
        uses: databricks/setup-cli@v0.278.0

      - name: Instalar uv
        run: python -m pip install uv

      - name: Validar autenticação Databricks
        run: databricks current-user me

      - name: Validar bundle ibge DEV
        if: github.ref == 'refs/heads/dev'
        run: databricks bundle validate -t dev

      - name: Validar bundle ibge PROD
        if: github.ref == 'refs/heads/prod'
        run: databricks bundle validate -t prod

  deploy-ibge-prod:
    name: Deploy ibge PROD
    runs-on: ubuntu-latest
    needs: validate-ibge
    if: github.ref == 'refs/heads/prod' && github.event_name != 'pull_request'

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    defaults:
      run:
        working-directory: ibge

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar Databricks CLI
        uses: databricks/setup-cli@v0.278.0

      - name: Instalar uv
        run: python -m pip install uv

      - name: Deploy bundle ibge em PROD
        run: databricks bundle deploy -t prod --auto-approve