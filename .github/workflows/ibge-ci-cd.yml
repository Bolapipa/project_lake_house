name: CI/CD ibge

on:
  push:
    branches:
      - dev
      - prod
    paths:
      - 'ibge/**'
      - '.github/workflows/ibge-ci-cd.yml'

  pull_request:
    branches:
      - dev
      - prod
    paths:
      - 'ibge/**'
      - '.github/workflows/ibge-ci-cd.yml'

  workflow_dispatch:

jobs:
  validate-ibge:
    name: Validar bundle ibge
    runs-on: ubuntu-latest

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    defaults:
      run:
        working-directory: ibge

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar Databricks CLI
        uses: databricks/setup-cli@main # corrigido
        with:
          version: 0.278.1 # corrigido

      - name: Validar autenticação Databricks # corrigido
        run: databricks current-user me # corrigido

      - name: Validar bundle em dev
        if: github.ref == 'refs/heads/dev'
        run: databricks bundle validate -t dev

      - name: Validar bundle em prod
        if: github.ref == 'refs/heads/prod'
        run: databricks bundle validate -t prod

  deploy-ibge:
    name: Deploy bundle ibge
    needs: validate-ibge
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    defaults:
      run:
        working-directory: ibge

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar Databricks CLI
        uses: databricks/setup-cli@main # corrigido
        with:
          version: 0.278.1 # corrigido

      - name: Deploy em dev
        if: github.ref == 'refs/heads/dev'
        run: databricks bundle deploy -t dev --auto-approve # corrigido

      - name: Deploy em prod
        if: github.ref == 'refs/heads/prod'
        run: databricks bundle deploy -t prod --auto-approve # corrigido