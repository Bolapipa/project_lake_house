name: CI/CD pokemon

on:
  push:
    branches:
      - dev
      - prod
    paths:
      - 'pokemon/**'
      - '.github/workflows/pokemon-ci-cd.yml'

  pull_request:
    branches:
      - dev
      - prod
    paths:
      - 'pokemon/**'
      - '.github/workflows/pokemon-ci-cd.yml'

  workflow_dispatch:

jobs:
  validate-pokemon:
    name: Validar bundle pokemon
    runs-on: ubuntu-latest

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_BUNDLE_TF_DOWNLOAD_SIGNATURE_VERIFICATION: "false" # corrigido

    defaults:
      run:
        working-directory: pokemon

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar Databricks CLI
        uses: databricks/setup-cli@v0.297.2 # corrigido

      - name: Validar autenticação Databricks
        run: databricks current-user me # corrigido

      - name: Validar bundle pokemon DEV
        if: github.ref == 'refs/heads/dev'
        run: databricks bundle validate -t dev

      - name: Validar bundle pokemon PROD
        if: github.ref == 'refs/heads/prod'
        run: databricks bundle validate -t prod

  deploy-pokemon-dev:
    name: Deploy pokemon DEV
    runs-on: ubuntu-latest
    needs: validate-pokemon
    if: github.ref == 'refs/heads/dev' && github.event_name != 'pull_request'

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_BUNDLE_TF_DOWNLOAD_SIGNATURE_VERIFICATION: "false" # corrigido

    defaults:
      run:
        working-directory: pokemon

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar Databricks CLI
        uses: databricks/setup-cli@v0.297.2 # corrigido

      - name: Validar autenticação Databricks
        run: databricks current-user me # corrigido

      - name: Deploy bundle pokemon em DEV
        run: databricks bundle deploy -t dev --auto-approve

  deploy-pokemon-prod:
    name: Deploy pokemon PROD
    runs-on: ubuntu-latest
    needs: validate-pokemon
    if: github.ref == 'refs/heads/prod' && github.event_name != 'pull_request'

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_BUNDLE_TF_DOWNLOAD_SIGNATURE_VERIFICATION: "false" # corrigido

    defaults:
      run:
        working-directory: pokemon

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar Databricks CLI
        uses: databricks/setup-cli@v0.297.2 # corrigido

      - name: Validar autenticação Databricks
        run: databricks current-user me # corrigido

      - name: Deploy bundle pokemon em PROD
        run: databricks bundle deploy -t prod --auto-approve
