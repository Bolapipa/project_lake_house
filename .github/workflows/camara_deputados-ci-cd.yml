name: CI/CD camara_deputados

on:
  push:
    branches:
      - dev
      - prod
    paths:
      - 'camara_deputados/**'
      - '.github/workflows/camara_deputados-ci-cd.yml'

  pull_request:
    branches:
      - dev
      - prod
    paths:
      - 'camara_deputados/**'
      - '.github/workflows/camara_deputados-ci-cd.yml'

  workflow_dispatch:

jobs:
  validate-camara-deputados:
    name: Validar bundle camara_deputados
    runs-on: ubuntu-latest

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    defaults:
      run:
        working-directory: camara_deputados

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Instalar Databricks CLI
        uses: databricks/setup-cli@main

      - name: Instalar uv
        run: python -m pip install uv

      - name: Validar autenticação Databricks
        run: databricks current-user me

      - name: Validar bundle camara_deputados DEV
        if: github.ref == 'refs/heads/dev'
        run: databricks bundle validate -t dev

      - name: Validar bundle camara_deputados PROD
        if: github.ref == 'refs/heads/prod'
        run: databricks bundle validate -t prod

  deploy-camara-deputados-dev:
    name: Deploy camara_deputados DEV
    runs-on: ubuntu-latest
    needs: validate-camara-deputados
    if: github.ref == 'refs/heads/dev' && github.event_name != 'pull_request'

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    defaults:
      run:
        working-directory: camara_deputados

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Instalar Databricks CLI
        uses: databricks/setup-cli@main

      - name: Instalar uv
        run: python -m pip install uv

      - name: Deploy bundle camara_deputados em DEV
        run: databricks bundle deploy -t dev --auto-approve

  deploy-camara-deputados-prod:
    name: Deploy camara_deputados PROD
    runs-on: ubuntu-latest
    needs: validate-camara-deputados
    if: github.ref == 'refs/heads/prod' && github.event_name != 'pull_request'

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    defaults:
      run:
        working-directory: camara_deputados

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Instalar Databricks CLI
        uses: databricks/setup-cli@main

      - name: Instalar uv
        run: python -m pip install uv

      - name: Deploy bundle camara_deputados em PROD
        run: databricks bundle deploy -t prod --auto-approve
