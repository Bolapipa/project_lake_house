# Pipeline para camada Silver (Bronze -> Silver)
resources:
  pipelines:
    camara_deputados_pipeline:
      name: camara_deputados_etl_${bundle.target}
      catalog: silver_${var.environment}
      schema: ds_camara_deputados

      tags:
        environment: ${var.environment}
        layer: silver

      serverless: true

      libraries:
        - notebook:
            path: ../src/dlt_camara_deputados.sql

      configuration:
        bundle.sourcePath: ${workspace.file_path}/src
        bronze_catalog: ${var.catalog}
