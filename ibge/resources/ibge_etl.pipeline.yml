# The main pipeline for ibge
resources:
  pipelines:
    ibge_pipeline:
      name: ibge_etl_${bundle.target}
      catalog: silver_${var.environment}
      schema: ds_ibge

      tags:
        environment: ${var.environment}

      serverless: true

      libraries:
        - notebook:
            path: ../src/dlt_ibge.sql

      configuration:
        bundle.sourcePath: ${workspace.file_path}/src