resources:
  jobs:
    ibge_job:
      name: ibge_${bundle.target}

      tags:
        environment: ${bundle.target}

      schedule:
        quartz_cron_expression: "0 0 22 * * ?"
        timezone_id: "America/Sao_Paulo"
        pause_status: ${var.pause_status}
        
      parameters:
        - name: environment
          default: "${var.environment}"

        - name: catalog
          default: "${var.catalog}"

        - name: schema
          default: "${var.schema}"

      email_notifications:
        on_failure:
          - delacortearthur@gmail.com

      tasks:
        - task_key: ingest_regioes
          notebook_task:
            notebook_path: ../src/ingest_regioes.py
            base_parameters:
              environment: "{{job.parameters.environment}}"
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
          max_retries: 1

        - task_key: ingest_estados
          depends_on:
            - task_key: ingest_regioes
          notebook_task:
            notebook_path: ../src/ingest_estados.py
            base_parameters:
              environment: "{{job.parameters.environment}}"
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
          max_retries: 1

        - task_key: ingest_mesorregioes
          depends_on:
            - task_key: ingest_estados
          notebook_task:
            notebook_path: ../src/ingest_mesorregioes.py
            base_parameters:
              environment: "{{job.parameters.environment}}"
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
          max_retries: 1

        - task_key: ingest_microrregioes
          depends_on:
            - task_key: ingest_mesorregioes
          notebook_task:
            notebook_path: ../src/ingest_microrregioes.py
            base_parameters:
              environment: "{{job.parameters.environment}}"
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
          max_retries: 1

        - task_key: ingest_regioes_intermediarias
          depends_on:
            - task_key: ingest_microrregioes
          notebook_task:
            notebook_path: ../src/ingest_regioes_intermediarias.py
            base_parameters:
              environment: "{{job.parameters.environment}}"
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
          max_retries: 1

        - task_key: ingest_regioes_imediatas
          depends_on:
            - task_key: ingest_regioes_intermediarias
          notebook_task:
            notebook_path: ../src/ingest_regioes_imediatas.py
            base_parameters:
              environment: "{{job.parameters.environment}}"
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
          max_retries: 1

        - task_key: ingest_municipios
          depends_on:
            - task_key: ingest_regioes_imediatas
          notebook_task:
            notebook_path: ../src/ingest_municipios.py
            base_parameters:
              environment: "{{job.parameters.environment}}"
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
          max_retries: 1

        - task_key: ingest_distritos
          depends_on:
            - task_key: ingest_municipios
          notebook_task:
            notebook_path: ../src/ingest_distritos.py
            base_parameters:
              environment: "{{job.parameters.environment}}"
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
          max_retries: 1

        - task_key: ingest_subdistritos
          depends_on:
            - task_key: ingest_distritos
          notebook_task:
            notebook_path: ../src/ingest_subdistritos.py
            base_parameters:
              environment: "{{job.parameters.environment}}"
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
          max_retries: 1

        - task_key: ingest_regioes_metropolitanas
          depends_on:
            - task_key: ingest_subdistritos
          notebook_task:
            notebook_path: ../src/ingest_regioes_metropolitanas.py
            base_parameters:
              environment: "{{job.parameters.environment}}"
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
          max_retries: 1

        - task_key: ingest_aglomeracoes_urbanas
          depends_on:
            - task_key: ingest_regioes_metropolitanas
          notebook_task:
            notebook_path: ../src/ingest_aglomeracoes_urbanas.py
            base_parameters:
              environment: "{{job.parameters.environment}}"
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
          max_retries: 1

        - task_key: ingest_regioes_integradas_desenvolvimento
          depends_on:
            - task_key: ingest_aglomeracoes_urbanas
          notebook_task:
            notebook_path: ../src/ingest_regioes_integradas_desenvolvimento.py
            base_parameters:
              environment: "{{job.parameters.environment}}"
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
          max_retries: 1

        - task_key: refresh_pipeline
          depends_on:
            - task_key: ingest_regioes
            - task_key: ingest_estados
            - task_key: ingest_mesorregioes
            - task_key: ingest_microrregioes
            - task_key: ingest_regioes_intermediarias
            - task_key: ingest_regioes_imediatas
            - task_key: ingest_municipios
            - task_key: ingest_distritos
            - task_key: ingest_subdistritos
            - task_key: ingest_regioes_metropolitanas
            - task_key: ingest_aglomeracoes_urbanas
            - task_key: ingest_regioes_integradas_desenvolvimento
          pipeline_task:
            pipeline_id: ${resources.pipelines.ibge_pipeline.id}
          max_retries: 1
        # Refresh do Pipeline DLT Gold (Silver → Gold)
        - task_key: refresh_gold_pipeline
          depends_on:
            - task_key: refresh_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.ibge_gold_pipeline.id}
          max_retries: 1
