resources:
  pipelines:
    ibge_gold_pipeline:
      name: 'IBGE Gold Pipeline'
      
      # Destino: catálogo e schema GOLD
      catalog: gold_${var.environment}
      schema: dm_ibge
      
      libraries:
        - notebook:
            path: ../src/dlt_ibge_gold.sql.ipynb
      
      # Variáveis de ambiente para referenciar Silver correto
      configuration:
        environment: ${var.environment}
        silver_catalog: ${var.silver_catalog}
      
      serverless: true
      continuous: false
      development: ${var.pipeline_development}
      photon: true
      channel: current
      
      permissions:
        - level: CAN_VIEW
          group_name: 'users'
